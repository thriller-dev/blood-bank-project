{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card card-custom shadow border-0">
                <div class="card-header bg-danger text-white">
                    <h3 class="mb-0"><i class="fa-solid fa-user-plus me-2"></i>Donor Registration</h3>
                </div>
                <div class="card-body p-4">
                    <p class="text-muted mb-4">Please fill out the form below to register as a blood donor. Your information will help save lives.</p>
                    
                    <form method="POST" novalidate>
                        {% csrf_token %}
                        {{ form|crispy }}
                        
                        <div class="mt-4">
                            <button type="submit" class="btn btn-danger w-100 fw-bold py-2">Register Now</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
